name: Release

on:
  push:
    tags: ["v*"]

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get tag annotation
        id: tag-msg
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          ref_json=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}")
          tag_sha=$(echo "$ref_json" | jq -r '.object.sha')
          tag_msg=$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_sha}" --jq '.message')
          echo "msg<<TAGEOF" >> "$GITHUB_OUTPUT"
          echo "$tag_msg" >> "$GITHUB_OUTPUT"
          echo "TAGEOF" >> "$GITHUB_OUTPUT"
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          TAG_MSG: ${{ steps.tag-msg.outputs.msg }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/releases" \
            -f tag_name="$TAG" \
            -f name="$TAG" \
            -f body="$TAG_MSG" \
            -F draft=false \
            -F prerelease=false \
            -f make_latest=false

  build:
    needs: create-release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create dummy binary
        run: echo "dummy build for ${{ matrix.target }}" > aweber
      - name: Package (unix)
        if: matrix.os != 'windows-latest'
        run: tar czf aweber-${{ matrix.target }}.tar.gz aweber
      - name: Package (windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path aweber -DestinationPath aweber-${{ matrix.target }}.zip
      - name: Upload artifact to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release upload "$TAG" aweber-*.tar.gz aweber-*.zip 2>/dev/null || gh release upload "$TAG" aweber-*.zip 2>/dev/null || gh release upload "$TAG" aweber-*.tar.gz

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Mark release as latest
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --latest
